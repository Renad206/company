<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بوابة التوظيف - منقية</title>

<style>

 /* Navbar التصميم الجديد */
        .navbar { width: 100%; background: var(--card-bg); border-bottom: 1px solid #222; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .nav-brand { font-weight: 700; font-size: 1.5rem; color: var(--purple-accent); letter-spacing: 2px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links span { color: var(--text-dim); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .nav-links span:hover { color: var(--purple-accent); }
        .user-icon { background: #222; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--purple-accent); cursor: pointer; }



:root {
--bg-color: #000000;
--card-bg: #000000;
--text-white: #ffffff;
--border-color: #222;
--glow-purple: 0 0 20px 2px rgba(160, 32, 240, 0.8), 0 0 40px 5px rgba(160, 32, 240, 0.4);
}

body{
font-family: Arial;
background-color: var(--bg-color);
color: var(--text-white);
margin:0;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
border-bottom:1px solid #222;
background:#000;
}

.logo{
color:#a020f0;
font-size:22px;
font-weight:bold;
}

.nav-right{
display:flex;
gap:25px;
align-items:center;
}

.user-box{
background:#111;
padding:8px 15px;
border-radius:20px;
}

/* GRID */

.container{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:30px;
max-width:1300px;
margin:60px auto;
padding:0 20px;
}

.sector-card{
background:var(--card-bg);
border:1px solid var(--border-color);
border-radius:8px;
padding:60px 40px;
position:relative;
cursor:pointer;
transition:0.4s;
text-align:center;
}

.sector-title{
font-size:1.6rem;
}

.notification-bell{
position:absolute;
top:15px;
right:15px;
background:#fff;
color:#000;
border-radius:50%;
width:26px;
height:26px;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
font-weight:bold;
}

.bell-icon{
position:absolute;
top:12px;
right:48px;
font-size:16px;
}

.sector-card:hover{
border-color:#a020f0;
box-shadow:var(--glow-purple);
transform:translateY(-5px);
}

</style>

</head>

<body>

<nav class="navbar">
    <div class="nav-brand">MANQIYAH</div>
    <div class="nav-links">
        <span>الوظائف</span>
        <span>المتقدمين</span>
        <span>التقارير</span>
    </div>
    <div class="user-icon">👤</div>
</nav>
