<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الاستفسارات - نسخة محسنة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --purple-accent: #a020f0;
            --purple-glow: 0 0 15px rgba(160, 32, 240, 0.6);
            --green-accept: #2ecc71;
            --red-reject: #e74c3c;
            --yellow-review: #f1c40f;
            --blue-info: #3498db;
        }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .main-wrapper { display: grid; grid-template-columns: 320px 1fr; gap: 25px; max-width: 1400px; margin: 0 auto; }

        .sidebar { display: flex; flex-direction: column; gap: 10px; height: 90vh; overflow-y: auto; }
        .sidebar-header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1a1a1a; padding: 15px; border-radius: 8px; cursor: pointer; 
            border: 1px solid #333; transition: 0.3s;
        }
        .sidebar-header:hover { border-color: var(--purple-accent); }
        .items-container { display: none; flex-direction: column; gap: 5px; padding: 10px 5px; }
        
        .msg-count { background: var(--purple-accent); color: white; padding: 2px 8px; border-radius: 50%; font-size: 0.8rem; font-weight: bold; }
        
        .name-card { background: var(--card-bg); border: 1px solid #222; padding: 12px; border-radius: 8px; cursor: pointer; position: relative; transition: 0.3s; font-size: 0.9rem; }
        .name-card:hover, .name-card.active { border-color: var(--purple-accent); box-shadow: var(--purple-glow); }
        .unread-dot { width: 8px; height: 8px; background: var(--red-reject); border-radius: 50%; position: absolute; top: 8px; left: 8px; }

        .main-panel { background: var(--card-bg); border: 1px solid #222; border-radius: 12px; padding: 40px; min-height: 80vh; position: relative; display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; padding: 5px 15px; border: 1px solid var(--yellow-review); color: var(--yellow-review); border-radius: 4px; font-size: 0.8rem; font-weight: bold; }

        .info-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; margin-top: 40px; }
        .data-row { display: flex; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; margin-bottom: 8px; }
        .label { color: var(--text-dim); width: 130px; font-size: 0.9rem; }

        #moreDetails { display: none; margin-top: 10px; border-top: 1px dashed #333; padding-top: 15px; }

        .btn { padding: 10px 15px; border-radius: 4px; cursor: pointer; font-family: 'Tajawal'; font-size: 0.85rem; border: 1px solid #444; background: transparent; color: white; transition: 0.3s; }
        .btn-accept { border-color: var(--green-accept); color: var(--green-accept); }
        .btn-reject { border-color: var(--red-reject); color: var(--red-reject); }
        .btn-review { border-color: var(--yellow-review); color: var(--yellow-review); }
        .btn-details { border-color: var(--purple-accent); color: var(--purple-accent); margin-top: 10px; width: 100%; }

        .chat-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .chat-box { background: #080808; height: 150px; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; max-width: 80%; }
        .msg.candidate { background: #222; align-self: flex-start; }
        .msg.staff { background: var(--purple-accent); align-self: flex-end; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar">
        <div class="sidebar-header" onclick="toggleSection('candidateListContainer')">
            <span style="font-weight: bold; color: var(--purple-accent);">المرشحين الجدد</span>
            <div class="msg-count" id="candidateNotif">0</div>
        </div>
        <div id="candidateListContainer" class="items-container">
            <div id="candidateList"></div>
        </div>

        <div class="sidebar-header" onclick="toggleSection('generalListContainer')">
            <span style="font-weight: bold; color: var(--blue-info);">الاستفسارات العامة</span>
            <div class="msg-count" id="generalNotif" style="background: var(--blue-info);">0</div>
        </div>
        <div id="generalListContainer" class="items-container">
            <div id="generalList"></div>
        </div>
    </div>

    <div class="main-panel" id="mainPanel">
        <div id="statusBadge" class="status-badge">قيد المراجعة</div>
        <h2 id="headerName" style="text-align: center; border-bottom: 1px solid #222; padding-bottom: 15px; cursor: pointer;" onclick="toggleContentOnly()"></h2>

        <div id="contentToToggle">
            <div class="info-grid">
                <div class="ai-side" id="aiSection">
                    <div class="salary-section" style="text-align: center;">
                        <div style="font-size: 0.8rem; color: var(--text-dim);">الراتب المتوقع:</div>
                        <div class="salary-display" id="salaryVal" style="font-size: 2.2rem; color: var(--purple-accent); font-weight: bold; margin: 10px 0;"></div>
                        <div id="salaryCtrls" style="display:none; margin-bottom:10px; gap:10px; justify-content:center;">
                            <button class="btn" onclick="tempSalaryChange(-500)">-</button>
                            <span id="tempSalary" style="font-family: Arial; align-self: center;"></span>
                            <button class="btn" onclick="tempSalaryChange(500)">+</button>
                        </div>
                        <button class="btn btn-review" id="editSaveBtn" onclick="handleSalaryBtn()">تحرير الراتب</button>
                    </div>
                </div>

                <div class="personal-data">
                    <div class="data-row"><span class="label">الهوية:</span> <span id="detID"></span></div>
                    <div class="data-row"><span class="label">رقم الجوال:</span> <span id="detPhone"></span></div>
                    
                    <div id="moreDetails">
                        <div class="data-row"><span class="label">تاريخ الميلاد:</span> <span id="detDOB"></span></div>
                        <div class="data-row"><span class="label">البريد:</span> <span id="detEmail"></span></div>
                        <div class="data-row"><span class="label">الجامعة:</span> <span id="detUni"></span></div>
                        <div class="data-row"><span class="label">الخبرة:</span> <span id="detExp"></span></div>
                        <div class="data-row"><span class="label">المهارات:</span> <span id="detSkills"></span></div>
                    </div>
                    <button class="btn btn-details" id="toggleDetailsBtn" onclick="toggleFullDetails()">عرض كامل التفاصيل</button>
                </div>
            </div>

            <div class="chat-section">
                <div class="chat-box" id="chatBox"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chatInput" style="flex:1; background: #1a1a1a; border:1px solid #333; color:white; padding:10px; border-radius:4px;" placeholder="اكتب الرد هنا...">
                    <button class="btn btn-accept" onclick="sendMsg()">إرسال</button>
                </div>
            </div>

            <div id="actionBtns" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px;">
                <button class="btn btn-review" onclick="updateStatus('قيد المراجعة')">قيد المراجعة</button>
                <button class="btn btn-accept" onclick="updateStatus('تم القبول')">قبول</button>
                <button class="btn btn-reject" onclick="updateStatus('تم الرفض')">رفض</button>
            </div>
        </div>
    </div>
</div>

<script>
    let activeType = null;
    let activeIdx = null;
    let isEditingSalary = false;
    let currentTempSalary = 0;

    const candidates = [
        { name: "عبدالله محمد محمد الدوسري", id: "113884422", phone: "0501234567", dob: "1995/05/12", email: "abd@gmail.com", uni: "جامعة الملك فيصل", exp: "4 سنوات", skills: "إدارة مشاريع، تحليل بيانات", salary: 7000, status: "قيد المراجعة", unread: true, chat: [{s:'c', t:'متى موعد المقابلة؟'}] },
        { name: "فهد منصور العتيبي", id: "109223344", phone: "0559988776", dob: "1992/10/20", email: "fahad@gmail.com", uni: "جامعة الملك سعود", exp: "6 سنوات", skills: "أمن سيبراني، جافا", salary: 9500, status: "قيد المراجعة", unread: true, chat: [{s:'c', t:'تم إرسال الملفات بنجاح'}] },
        { name: "سارة علي احمد", id: "112233445", phone: "0544556677", dob: "1997/03/15", email: "sara@gmail.com", uni: "جامعة الأميرة نورة", exp: "سنتان", skills: "تصميم واجهات، مونتاج", salary: 6500, status: "قيد المراجعة", unread: true, chat: [{s:'c', t:'أود الاستفسار عن مميزات العقد'}] }
    ];

    const generalInquiries = [
        { name: "سلطان خالد العتيبي", phone: "0561122334", unread: true, chat: [{s:'c', t:'هل التقديم لا يزال متاحاً؟'}] },
        { name: "محمد إبراهيم الحربي", phone: "0504433221", unread: true, chat: [{s:'c', t:'أين موقع المقابلات؟'}] },
        { name: "نورة صالح الشهري", phone: "0558877665", unread: true, chat: [{s:'c', t:'هل تقبلون تخصصات الهندسة؟'}] }
    ];

    function init() {
        renderList('candidateList', candidates, 'candidate');
        renderList('generalList', generalInquiries, 'general');
        document.getElementById('candidateNotif').innerText = candidates.filter(c => c.unread).length;
        document.getElementById('generalNotif').innerText = generalInquiries.filter(g => g.unread).length;
    }

    function toggleSection(containerId) {
        const container = document.getElementById(containerId);
        const mainPanel = document.getElementById('mainPanel');
        if (container.style.display === 'flex') {
            container.style.display = 'none';
            mainPanel.style.display = 'none'; 
            activeIdx = null; activeType = null;
        } else { container.style.display = 'flex'; }
    }

    function toggleContentOnly() {
        const content = document.getElementById('contentToToggle');
        content.style.display = (content.style.display === 'none') ? 'block' : 'none';
    }

    function renderList(id, data, type) {
        const list = document.getElementById(id);
        list.innerHTML = '';
        data.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = `name-card ${activeType === type && activeIdx === i ? 'active' : ''}`;
            card.innerHTML = `${item.unread ? '<div class="unread-dot"></div>' : ''} <div>${item.name}</div>`;
            card.onclick = (e) => { e.stopPropagation(); selectItem(type, i); };
            list.appendChild(card);
        });
    }

    function selectItem(type, i) {
        activeType = type; activeIdx = i; isEditingSalary = false;
        const item = (type === 'candidate') ? candidates[i] : generalInquiries[i];
        item.unread = false;

        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('contentToToggle').style.display = 'block';
        document.getElementById('headerName').innerText = item.name;
        document.getElementById('detID').innerText = item.id || "غير متوفر";
        document.getElementById('detPhone').innerText = item.phone;
        
        document.getElementById('moreDetails').style.display = 'none';
        document.getElementById('toggleDetailsBtn').innerText = "عرض كامل التفاصيل";
        document.getElementById('salaryCtrls').style.display = 'none';
        document.getElementById('editSaveBtn').innerText = "تحرير الراتب";

        // التعديل المطلوب: إخفاء أزرار الحالة والبادج للاستفسارات العامة
        const statusBadge = document.getElementById('statusBadge');
        const actionBtns = document.getElementById('actionBtns');
        const aiSection = document.getElementById('aiSection');
        const toggleBtn = document.getElementById('toggleDetailsBtn');

        if(type === 'general') {
            statusBadge.style.display = 'none';
            actionBtns.style.display = 'none';
            aiSection.style.display = 'none';
            toggleBtn.style.display = 'none';
        } else {
            statusBadge.style.display = 'block';
            actionBtns.style.display = 'flex';
            aiSection.style.display = 'block';
            toggleBtn.style.display = 'block';
            document.getElementById('detDOB').innerText = item.dob;
            document.getElementById('detEmail').innerText = item.email;
            document.getElementById('detUni').innerText = item.uni;
            document.getElementById('detExp').innerText = item.exp;
            document.getElementById('detSkills').innerText = item.skills;
            document.getElementById('salaryVal').innerText = item.salary;
            renderStatus(item.status);
        }
        renderChat();
        init();
    }

    function handleSalaryBtn() {
        const ctrls = document.getElementById('salaryCtrls');
        const btn = document.getElementById('editSaveBtn');
        const valDisplay = document.getElementById('salaryVal');
        if (!isEditingSalary) {
            isEditingSalary = true;
            currentTempSalary = candidates[activeIdx].salary;
            document.getElementById('tempSalary').innerText = currentTempSalary;
            ctrls.style.display = 'flex'; valDisplay.style.display = 'none';
            btn.innerText = "حفظ"; btn.style.color = "var(--green-accept)";
        } else {
            candidates[activeIdx].salary = currentTempSalary;
            valDisplay.innerText = candidates[activeIdx].salary;
            isEditingSalary = false;
            ctrls.style.display = 'none'; valDisplay.style.display = 'block';
            btn.innerText = "تحرير الراتب"; btn.style.color = "var(--yellow-review)";
        }
    }

    function tempSalaryChange(v) { currentTempSalary += v; document.getElementById('tempSalary').innerText = currentTempSalary; }
    function toggleFullDetails() {
        const more = document.getElementById('moreDetails');
        const btn = document.getElementById('toggleDetailsBtn');
        const isHidden = more.style.display === 'none';
        more.style.display = isHidden ? 'block' : 'none';
        btn.innerText = isHidden ? "إخفاء التفاصيل" : "عرض كامل التفاصيل";
    }
    function updateStatus(s) { candidates[activeIdx].status = s; renderStatus(s); }
    function renderStatus(s) {
        const badge = document.getElementById('statusBadge');
        badge.innerText = s;
        badge.style.borderColor = s.includes('قبول') ? 'var(--green-accept)' : (s.includes('رفض') ? 'var(--red-reject)' : 'var(--yellow-review)');
        badge.style.color = badge.style.borderColor;
    }
    function renderChat() {
        const box = document.getElementById('chatBox');
        box.innerHTML = '';
        const item = (activeType === 'candidate') ? candidates[activeIdx] : generalInquiries[activeIdx];
        item.chat.forEach(m => {
            const d = document.createElement('div');
            d.className = `msg ${m.s === 'c' ? 'candidate' : 'staff'}`;
            d.innerText = m.t; box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
    }
    function sendMsg() {
        const input = document.getElementById('chatInput');
        if(!input.value) return;
        const item = (activeType === 'candidate') ? candidates[activeIdx] : generalInquiries[activeIdx];
        item.chat.push({s: 's', t: input.value});
        input.value = ''; renderChat();
    }
    init();
</script>
</body>
</html>
